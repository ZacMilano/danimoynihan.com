<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>danimoynihan.com</title>
  <link rel="icon" href="favicon.ico" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #f5d6e8;
      font-family: Georgia, 'Times New Roman', serif;
      color: #7a5070;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Password screen ── */
    #password-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px 24px;
    }

    #password-screen label {
      font-size: 1.1rem;
      letter-spacing: 0.03em;
    }

    #password-input {
      padding: 10px 16px;
      font-size: 1rem;
      border: 2px solid #c9a0bc;
      border-radius: 8px;
      background: #fdf0f8;
      color: #7a5070;
      outline: none;
      width: 220px;
      text-align: center;
    }

    #password-input:focus {
      border-color: #a07090;
    }

    #submit-btn {
      padding: 10px 28px;
      font-size: 1rem;
      background-color: #c9a0bc;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background-color 0.2s;
    }

    #submit-btn:hover {
      background-color: #a07090;
    }

    #error-msg {
      color: #b04060;
      font-size: 0.9rem;
      min-height: 1.2em;
    }

    /* ── Image screen ── */
    #image-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
      width: 100%;
    }

    #image-screen h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: normal;
      letter-spacing: 0.05em;
      margin-bottom: 56px;
      text-align: center;
      color: #7a5070;
    }

    /* ── Collage ── */
    .collage {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      max-width: 860px;
      width: 100%;
      padding: 20px 0 40px;
    }

    .collage-item {
      flex: 0 0 auto;
      width: clamp(140px, 38vw, 220px);
    }

    .collage-item img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 8px 20px 4px rgba(122, 80, 112, 0.75);
    }

    /* Scattered rotations — each nth-child gets its own tilt */
    .collage-item:nth-child(1) { transform: rotate(-3deg)   translateY(8px); }
    .collage-item:nth-child(2) { transform: rotate(2.5deg)  translateY(-6px); }
    .collage-item:nth-child(3) { transform: rotate(-1.5deg) translateY(12px); }
    .collage-item:nth-child(4) { transform: rotate(4deg)    translateY(-4px); }
    .collage-item:nth-child(5) { transform: rotate(-2.5deg) translateY(6px); }
    .collage-item:nth-child(6) { transform: rotate(1.5deg)  translateY(-10px); }
    .collage-item:nth-child(7) { transform: rotate(-3.5deg) translateY(4px); }

    /* On mobile, soften the tilts so nothing clips awkwardly */
    @media (max-width: 480px) {
      .collage-item:nth-child(1) { transform: rotate(-1.5deg) translateY(4px); }
      .collage-item:nth-child(2) { transform: rotate(1deg)    translateY(-3px); }
      .collage-item:nth-child(3) { transform: rotate(-1deg)   translateY(5px); }
      .collage-item:nth-child(4) { transform: rotate(2deg)    translateY(-2px); }
      .collage-item:nth-child(5) { transform: rotate(-1.5deg) translateY(3px); }
      .collage-item:nth-child(6) { transform: rotate(1deg)    translateY(-4px); }
      .collage-item:nth-child(7) { transform: rotate(-2deg)   translateY(2px); }
    }
  </style>
</head>
<body>

  <div id="password-screen">
    <label for="password-input">Enter password</label>
    <input type="password" id="password-input" autocomplete="off" />
    <button id="submit-btn">Enter</button>
    <p id="error-msg"></p>
  </div>

  <div id="image-screen">
    <h1>Happy Birthday!</h1>
    <div class="collage">
      <div class="collage-item"><img src="image.png" alt="" /></div>
      <div class="collage-item"><img src="image.png" alt="" /></div>
      <div class="collage-item"><img src="image.png" alt="" /></div>
      <div class="collage-item"><img src="image.png" alt="" /></div>
      <div class="collage-item"><img src="image.png" alt="" /></div>
    </div>
  </div>

  <script>
    const PASSWORD = "churro";

    const input = document.getElementById("password-input");
    const btn   = document.getElementById("submit-btn");
    const error = document.getElementById("error-msg");
    const pwScreen  = document.getElementById("password-screen");
    const imgScreen = document.getElementById("image-screen");

    function attempt() {
      if (input.value === PASSWORD) {
        pwScreen.style.display  = "none";
        imgScreen.style.display = "flex";
      } else {
        error.textContent = "Incorrect password. Try again.";
        input.value = "";
        input.focus();
      }
    }

    btn.addEventListener("click", attempt);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") attempt();
    });
  </script>

</body>
</html>
